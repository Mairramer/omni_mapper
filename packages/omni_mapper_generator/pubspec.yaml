name: omni_mapper_generator
description: A powerful code generator that automates boilerplate mapping conversions using the omni_mapper annotations.
version: 0.5.1
homepage: https://github.com/Mairramer/omni_mapper
repository: https://github.com/Mairramer/omni_mapper
issue_tracker: https://github.com/Mairramer/omni_mapper/issues

topics:
  - mapper
  - code-generation
  - build-runner
  - source-gen

environment:
  sdk: '>=3.12.0 <4.0.0'

resolution: workspace

dependencies:
  analyzer: '>=10.0.0 <15.0.0'
  build: '>=2.4.1 <5.0.0'
  code_builder: '>=4.10.0 <5.0.0'
  omni_mapper: ^0.5.1
  source_gen: '>=1.5.0 <5.0.0'
  dart_style: ^3.1.7


dev_dependencies:
  build_test: ^3.5.15
  source_gen_test: ^1.3.6
  test: ^1.31.1
